<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Galeri Ricky & Hilda</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f8f8f8;
margin:0;
}

header{
padding:30px;
text-align:center;
background:white;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.gallery{
padding:20px;
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.info{
padding:15px;
}

.download{
display:inline-block;
margin-top:10px;
padding:8px 12px;
background:black;
color:white;
text-decoration:none;
border-radius:5px;
}

</style>

</head>

<body>

<header>

<h1>Galeri Ricky & Hilda</h1>

<p>Kumpulan Momen Terbaik</p>

</header>

<div class="gallery" id="gallery"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbw6vNXfKEYTbfb0ia0Q288nQYO53T-fWI-vpyXXTQBIHQivCRHVMguBKYoQ2Ctigrsn/exec";
fetch(API)
.then(res=>res.json())
.then(data=>{

const gallery =
document.getElementById("gallery");

data.forEach(item=>{

gallery.innerHTML += `

<div class="card">

<img src="${item.preview}" alt="${item.nama}">

<div class="info">

<h3>${item.nama}</h3>

<p>Galeri Ricky & Hilda</p>

<a href="${item.download}"
target="_blank"
class="download">

Download

</a>

</div>

</div>

`;

});

});

</script>

</body>
</html>
